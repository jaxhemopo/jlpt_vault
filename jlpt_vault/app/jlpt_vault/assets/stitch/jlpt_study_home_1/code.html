<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>JLPT Study Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ee8c2b",
                        "background-dark": "#1a1e24",
                        "card-blue": "#3b82f6",
                        "card-orange": "#f97316",
                        "card-green": "#22c55e",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        :root {
            --glass-bg: rgba(26, 30, 36, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        body {
            font-family: 'Lexend', sans-serif;
            min-height: 100dvh;
        }
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .toggle-container {
            background: rgba(0, 0, 0, 0.2);
            padding: 4px;
            border-radius: 9999px;
            display: flex;
            position: relative;
        }
        .toggle-slider {
            position: absolute;
            height: calc(100% - 8px);
            width: calc(50% - 4px);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 9999px;
            transition: transform 0.3s ease;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark text-slate-100 font-display selection:bg-primary/30">
<div class="relative flex h-screen w-full flex-col overflow-hidden mx-auto max-w-[430px] shadow-2xl bg-background-dark">
<div class="absolute inset-0 z-0">
<div class="absolute inset-0 bg-gradient-to-b from-background-dark/20 via-transparent to-background-dark/90 z-10"></div>
<div class="w-full h-full bg-cover bg-center opacity-60 scale-110" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuARnPsO-WaExKe0w6qLEt6d-KUQiFy9OSYeYcfOhy5lpSF6cd8_xVYESJiJtQTgQG9liuB_xOVMCb-4Q8uULUET59jMD-PeA0j_z2pYCL5gNg6IXXFrJKKl_6zgTAvvSyNU4e6Yq3xRmFFuqLrBPFNb6gEqC4iYCO3_cuWkLYMO_6Zb3Ghrw01KE0vMhxtktUE0Dl3InpCVG7Lre8R60m8HkdiBJaY6Dv3c0VlzUm7u8ZmmVyuyhB5VpWn3Aj_PVm-s4qUsqZfoTbSq');"></div>
</div>
<header class="relative z-20 flex items-center justify-between px-8 pt-14 pb-6">
<div class="flex flex-col">
<span class="text-[10px] uppercase tracking-[0.3em] text-primary font-semibold mb-1">Overview</span>
<h1 class="text-2xl font-light tracking-tight">JLPT Study</h1>
</div>
<div class="h-10 w-10 rounded-full glass-panel flex items-center justify-center">
<span class="material-symbols-outlined text-[20px] text-slate-300">notifications</span>
</div>
</header>
<main class="relative z-20 flex-1 px-8 flex flex-col items-center">
<div class="w-full max-w-[280px] mt-4">
<div class="toggle-container relative">
<div class="toggle-slider left-1"></div>
<button class="relative z-10 flex-1 py-2 text-sm font-medium text-white">Vocab</button>
<button class="relative z-10 flex-1 py-2 text-sm font-medium text-slate-400">Grammar</button>
</div>
</div>
<div class="w-full mt-10 space-y-4 flex-1">
<div class="group relative overflow-hidden rounded-2xl bg-blue-500/10 border border-blue-500/20 p-5 flex items-center justify-between transition-all active:scale-[0.98]">
<div class="flex items-center gap-4">
<div class="h-12 w-12 rounded-xl bg-blue-500/20 flex items-center justify-center text-blue-400">
<span class="material-symbols-outlined">add_circle</span>
</div>
<div>
<p class="text-[10px] uppercase tracking-widest text-blue-400/80 font-bold">New</p>
<p class="text-2xl font-light">12 <span class="text-sm text-slate-400">cards</span></p>
</div>
</div>
<span class="material-symbols-outlined text-blue-500/30">chevron_right</span>
</div>
<div class="group relative overflow-hidden rounded-2xl bg-orange-500/10 border border-orange-500/20 p-5 flex items-center justify-between transition-all active:scale-[0.98]">
<div class="flex items-center gap-4">
<div class="h-12 w-12 rounded-xl bg-orange-500/20 flex items-center justify-center text-orange-400">
<span class="material-symbols-outlined">auto_stories</span>
</div>
<div>
<p class="text-[10px] uppercase tracking-widest text-orange-400/80 font-bold">Learn</p>
<p class="text-2xl font-light">45 <span class="text-sm text-slate-400">cards</span></p>
</div>
</div>
<span class="material-symbols-outlined text-orange-500/30">chevron_right</span>
</div>
<div class="group relative overflow-hidden rounded-2xl bg-emerald-500/10 border border-emerald-500/20 p-5 flex items-center justify-between transition-all active:scale-[0.98]">
<div class="flex items-center gap-4">
<div class="h-12 w-12 rounded-xl bg-emerald-500/20 flex items-center justify-center text-emerald-400">
<span class="material-symbols-outlined">event_repeat</span>
</div>
<div>
<p class="text-[10px] uppercase tracking-widest text-emerald-400/80 font-bold">Due</p>
<p class="text-2xl font-light">128 <span class="text-sm text-slate-400">cards</span></p>
</div>
</div>
<span class="material-symbols-outlined text-emerald-500/30">chevron_right</span>
</div>
</div>
<div class="w-full pb-14 pt-8 mt-auto">
<button class="w-full bg-primary py-5 rounded-2xl flex items-center justify-center gap-3 shadow-lg shadow-primary/20 active:scale-95 transition-all group">
<span class="text-background-dark font-bold tracking-wider text-lg">Start Study</span>
<span class="material-symbols-outlined text-background-dark font-bold">arrow_forward_ios</span>
</button>
<p class="text-center mt-6 text-[11px] text-slate-500 uppercase tracking-[0.2em] font-medium">Daily Goal: 20/50 Cards</p>
</div>
</main>
<nav class="absolute bottom-0 left-0 right-0 z-30 px-6 pb-6">
<div class="glass-panel rounded-full flex items-center justify-around px-2 py-2 shadow-2xl">
<a class="flex h-12 w-12 flex-col items-center justify-center gap-0.5 text-primary" href="#">
<span class="material-symbols-outlined text-[24px]">grid_view</span>
</a>
<a class="flex h-12 w-12 flex-col items-center justify-center gap-0.5 text-slate-500 hover:text-slate-100 transition-colors" href="#">
<span class="material-symbols-outlined text-[24px]">import_contacts</span>
</a>
<a class="flex h-12 w-12 flex-col items-center justify-center gap-0.5 text-slate-500 hover:text-slate-100 transition-colors" href="#">
<span class="material-symbols-outlined text-[24px]">analytics</span>
</a>
<a class="flex h-12 w-12 flex-col items-center justify-center gap-0.5 text-slate-500 hover:text-slate-100 transition-colors" href="#">
<span class="material-symbols-outlined text-[24px]">person</span>
</a>
</div>
</nav>
</div>

</body></html>

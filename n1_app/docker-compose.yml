version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dev_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-mastermind_vault}
    ports:
      - "5432:5432"
    volumes:
      - mastermind_data:/var/lib/postgresql/data # This saves your life next time

volumes:
  mastermind_data: # This persists even if the container is deleted
